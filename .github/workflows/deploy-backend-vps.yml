name: Deploy backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR }}
      API_HEALTH_URL: ${{ vars.API_HEALTH_URL != '' && vars.API_HEALTH_URL || 'https://api.1marina.ru/health' }}
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "Missing required secret: VPS_HOST"
            exit 1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "Missing required secret: VPS_USER"
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing required secret: VPS_SSH_KEY"
            exit 1
          fi
          if [ -z "$VPS_PROJECT_DIR" ]; then
            echo "Missing required secret: VPS_PROJECT_DIR"
            exit 1
          fi
          if [ -z "$VPS_PORT" ]; then
            echo "VPS_PORT is empty, using 22"
            echo "VPS_PORT=22" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend on VPS
        run: |
          ssh -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "
            set -e
            cd '$VPS_PROJECT_DIR'
            echo '--- Deploy started on VPS ---'
            git pull --ff-only origin main
            npm ci
            npm run build:server
            pm2 describe marina-api >/dev/null 2>&1 && pm2 restart marina-api || pm2 start dist/server.js --name marina-api
            pm2 save
            echo '--- Deploy finished on VPS ---'
          "

      - name: Health check
        run: |
          curl -fsS --retry 5 --retry-all-errors --retry-delay 3 "$API_HEALTH_URL"
