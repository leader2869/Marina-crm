name: Deploy API to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'scripts/vps/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

# Secrets: VPS_SSH_KEY_B64 (рекомендуется) или VPS_SSH_KEY
# VPS: 185.46.11.187 (reg.ru), user root — IP зафиксирован, не используйте старый hostname cv7100943

env:
  VPS_IP: '185.46.11.187'
  VPS_USER: root

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          set -eu
          KEY_FILE=/tmp/vps_deploy_key
          VPS_HOST="${VPS_IP}"

          rm -f "$KEY_FILE"

          if [ -n "$VPS_SSH_KEY_B64" ]; then
            echo "Декодируем VPS_SSH_KEY_B64..."
            printf '%s' "$VPS_SSH_KEY_B64" | tr -d '\n\r\t ' | base64 -d > "$KEY_FILE"
          elif [ -n "$VPS_SSH_KEY" ]; then
            echo "Используем VPS_SSH_KEY..."
            printf '%s' "$VPS_SSH_KEY" > "$KEY_FILE"
          else
            echo "::error::Нет VPS_SSH_KEY_B64 / VPS_SSH_KEY"
            echo "Mac: bash scripts/vps/print-github-deploy-key-b64.sh | pbcopy"
            exit 1
          fi

          chmod 600 "$KEY_FILE"

          if ! grep -q "BEGIN.*PRIVATE KEY" "$KEY_FILE"; then
            echo "::error::Не приватный ключ OpenSSH"
            exit 1
          fi

          PUB=$(ssh-keygen -y -f "$KEY_FILE")
          FP=$(ssh-keygen -lf "$KEY_FILE" | awk '{print $2}')
          echo "Подключение: ${VPS_USER}@${VPS_HOST}"
          echo "Публичный ключ: ${PUB}"
          echo "Fingerprint: ${FP}"

          RESOLVED=$(getent ahosts "$VPS_HOST" | awk '/STREAM/ {print $1; exit}')
          echo "DNS/IP: ${RESOLVED:-не резолвится}"

          if ! ssh -i "$KEY_FILE" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            'echo SSH_OK'; then
            echo "::error::SSH отклонён на ${VPS_HOST}"
            echo "Fingerprint из secret: ${FP}"
            echo "Ожидается github-actions-deploy: SHA256:xbgDZQRTV5qeUU6/f/zWxSsprIMnCuzxMroyS0GwHeE"
            echo "Или marina-vps: SHA256:3/zs7EUidGv9f8OCTtRy4EJ3bfIHyCdJk3VuRidHxFg"
            echo "Обновить secret: bash scripts/vps/print-github-deploy-key-b64.sh"
            ssh -vvv -i "$KEY_FILE" \
              -o StrictHostKeyChecking=accept-new \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -o IdentitiesOnly=yes \
              "${VPS_USER}@${VPS_HOST}" \
              'true' 2>&1 | tail -25 || true
            exit 255
          fi

          ssh -i "$KEY_FILE" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o ConnectTimeout=60 \
            -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            'curl -fsSL "https://raw.githubusercontent.com/leader2869/Marina-crm/main/scripts/vps/repair-and-deploy.sh" | sed "s/\r$//" | bash'

          rm -f "$KEY_FILE"
          echo "Deploy OK"
