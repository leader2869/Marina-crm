name: Deploy API to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'scripts/vps/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY_B64 (рекомендуется) или VPS_SSH_KEY

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          set -eu
          KEY_FILE=/tmp/vps_deploy_key

          if [ -z "$VPS_HOST" ]; then
            echo "::error::Нет secret VPS_HOST"
            exit 1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "::error::Нет secret VPS_USER"
            exit 1
          fi

          rm -f "$KEY_FILE"

          if [ -n "$VPS_SSH_KEY_B64" ]; then
            echo "Декодируем VPS_SSH_KEY_B64..."
            printf '%s' "$VPS_SSH_KEY_B64" | tr -d '\n\r\t ' | base64 -d > "$KEY_FILE"
          elif [ -n "$VPS_SSH_KEY" ]; then
            echo "Используем VPS_SSH_KEY..."
            printf '%s' "$VPS_SSH_KEY" > "$KEY_FILE"
          else
            echo "::error::Нет VPS_SSH_KEY_B64 / VPS_SSH_KEY"
            echo "Mac: base64 < ~/.ssh/marina_vps | tr -d '\\n' | pbcopy → secret VPS_SSH_KEY_B64"
            exit 1
          fi

          chmod 600 "$KEY_FILE"

          if ! grep -q "BEGIN.*PRIVATE KEY" "$KEY_FILE"; then
            echo "::error::Не приватный ключ OpenSSH. Нужен marina_vps, не .pub"
            exit 1
          fi

          PUB=$(ssh-keygen -y -f "$KEY_FILE")
          echo "Публичный ключ из secret: ${PUB}"

          ssh -i "$KEY_FILE" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            "${VPS_USER}@${VPS_HOST}" \
            'curl -fsSL "https://raw.githubusercontent.com/leader2869/Marina-crm/main/scripts/vps/repair-and-deploy.sh" | sed "s/\r$//" | bash'

          rm -f "$KEY_FILE"
          echo "Deploy OK"
