name: Deploy API to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'scripts/vps/**'
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-/var/www/marina-crm}"
            if [[ -d "$APP_DIR/.git" && -f "$APP_DIR/scripts/vps/repair-and-deploy.sh" ]]; then
              bash "$APP_DIR/scripts/vps/repair-and-deploy.sh"
            elif [[ -d "$APP_DIR/repo/.git" && -f "$APP_DIR/repo/scripts/vps/repair-and-deploy.sh" ]]; then
              bash "$APP_DIR/repo/scripts/vps/repair-and-deploy.sh"
            else
              curl -fsSL "https://raw.githubusercontent.com/leader2869/Marina-crm/main/scripts/vps/repair-and-deploy.sh" | sed 's/\r$//' | bash
            fi
