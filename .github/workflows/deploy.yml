name: Deploy to reg.ru (SFTP)

on:
  push:
    branches:
      - main

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    env:
      SFTP_SERVER: ${{ secrets.SFTP_SERVER != '' && secrets.SFTP_SERVER || vars.SFTP_SERVER }}
      SFTP_USERNAME: ${{ secrets.SFTP_USERNAME != '' && secrets.SFTP_USERNAME || vars.SFTP_USERNAME }}
      # Пароль только из Secrets (не из Variables). Fallback: старый FTP_PASSWORD.
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD || secrets.FTP_PASSWORD }}
      SFTP_PORT: ${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || vars.SFTP_PORT }}
      SFTP_TARGET_DIR: ${{ secrets.SFTP_TARGET_DIR != '' && secrets.SFTP_TARGET_DIR || vars.SFTP_TARGET_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required SFTP secrets
        run: |
          if [ -z "$SFTP_SERVER" ]; then
            echo "Missing required secret/variable: SFTP_SERVER"
            exit 1
          fi
          if [ -z "$SFTP_USERNAME" ]; then
            echo "Missing required secret/variable: SFTP_USERNAME"
            exit 1
          fi
          if [ -z "$SFTP_PASSWORD" ]; then
            echo "Не задан пароль SFTP."
            echo "В GitHub: Settings → Secrets and variables → Actions → New repository secret"
            echo "Имя: SFTP_PASSWORD (или FTP_PASSWORD как запасной вариант). Значение — не пустая строка."
            exit 1
          fi
          if [ -z "$SFTP_PORT" ]; then
            echo "SFTP_PORT пустой, подставляю 22"
            echo "SFTP_PORT=22" >> "$GITHUB_ENV"
          fi
          if [ -z "$SFTP_TARGET_DIR" ]; then
            echo "Missing required secret/variable: SFTP_TARGET_DIR"
            exit 1
          fi

      - name: Install rsync + sshpass
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      - name: Deploy via SFTP (rsync over SSH)
        run: |
          export SSHPASS="$SFTP_PASSWORD"
          PORT="${SFTP_PORT:-22}"
          REMOTE="$SFTP_USERNAME@$SFTP_SERVER:$SFTP_TARGET_DIR"
          # --mkpath: создать целевую папку, если её нет (если существуют родители)
          if ! sshpass -e rsync -avz --delete --mkpath \
            -e "ssh -p $PORT -o StrictHostKeyChecking=accept-new" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude ".cursor/" \
            ./ "$REMOTE"; then
            echo ""
            echo "=== rsync: ошибка пути на сервере (часто mkdir ... No such file or directory) ==="
            echo "Проверьте секрет/переменную SFTP_TARGET_DIR."
            echo "Возьмите путь из панели reg.ru: «Файлы» / файловый менеджер — каталог сайта"
            echo "(часто что-то вроде .../domains/1marina.ru/public_html или .../www/1marina.ru)."
            echo "Путь /www/1marina.ru на виртуальном хостинге часто не существует."
            echo "Либо укажите путь относительно домашнего каталога FTP без ведущего слэша, например: www/1marina.ru"
            exit 1
          fi
