name: Deploy to reg.ru (SFTP)

on:
  push:
    branches:
      - main

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    env:
      SFTP_SERVER: ${{ secrets.SFTP_SERVER != '' && secrets.SFTP_SERVER || vars.SFTP_SERVER }}
      SFTP_USERNAME: ${{ secrets.SFTP_USERNAME != '' && secrets.SFTP_USERNAME || vars.SFTP_USERNAME }}
      # Пароль только из Secrets (не из Variables). Fallback: старый FTP_PASSWORD.
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD || secrets.FTP_PASSWORD }}
      SFTP_PORT: ${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || vars.SFTP_PORT }}
      SFTP_TARGET_DIR: ${{ secrets.SFTP_TARGET_DIR != '' && secrets.SFTP_TARGET_DIR || vars.SFTP_TARGET_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required SFTP secrets
        run: |
          if [ -z "$SFTP_SERVER" ]; then
            echo "Missing required secret/variable: SFTP_SERVER"
            exit 1
          fi
          if [ -z "$SFTP_USERNAME" ]; then
            echo "Missing required secret/variable: SFTP_USERNAME"
            exit 1
          fi
          if [ -z "$SFTP_PASSWORD" ]; then
            echo "Не задан пароль SFTP."
            echo "В GitHub: Settings → Secrets and variables → Actions → New repository secret"
            echo "Имя: SFTP_PASSWORD (или FTP_PASSWORD как запасной вариант). Значение — не пустая строка."
            exit 1
          fi
          if [ -z "$SFTP_PORT" ]; then
            echo "SFTP_PORT пустой, подставляю 22"
            echo "SFTP_PORT=22" >> "$GITHUB_ENV"
          fi
          if [ -z "$SFTP_TARGET_DIR" ]; then
            echo "Missing required secret/variable: SFTP_TARGET_DIR"
            exit 1
          fi

      - name: Install rsync + sshpass
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend (Vite)
        run: |
          cd client
          npm ci
          npm run build

      - name: Deploy via SFTP (rsync over SSH)
        run: |
          export SSHPASS="$SFTP_PASSWORD"
          PORT="${SFTP_PORT:-22}"
          # Убрать завершающий слэш — rsync трактует trailing slash иначе для источника; для приёма так стабильнее
          TARGET="${SFTP_TARGET_DIR%/}"

          # Без --mkpath: на хостинге старый rsync (3.1.x) на стороне приёмника ругается:
          # «--mkpath: unknown option» — тогда падает и локальный 3.2.x.
          run_rsync() {
            local dest="$1"
            sshpass -e rsync -avz --delete \
              --ignore-times \
              -e "ssh -p $PORT -o StrictHostKeyChecking=accept-new" \
              ./client/dist/ "$SFTP_USERNAME@$SFTP_SERVER:$dest"
          }

          # На виртуальном хостинге абсолютные пути вроде /new1 могут указывать в корень ОС,
          # куда у SFTP-пользователя нет прав. Поэтому при падении пробуем относительный путь
          # от домашнего каталога пользователя (убираем ведущий /).
          if run_rsync "$TARGET"; then
            exit 0
          fi
          if [[ "$TARGET" == /* ]]; then
            REL="${TARGET#/}"
            echo ""
            echo "Повтор rsync с относительным путём: $REL"
            if run_rsync "$REL"; then
              exit 0
            fi
          fi
          echo ""
          echo "=== rsync: не удалось записать файлы ==="
          echo "Проверьте SFTP_TARGET_DIR. В секретах можно указать:"
          echo "  • как в панели: /www/1marina.ru — workflow сам попробует www/1marina.ru;"
          echo "  • или сразу относительный: www/1marina.ru;"
          echo "  • или полный путь из SSH, если он отличается (…/domains/…/public_html)."
          exit 1
