# Marina CRM — только API на VPS (фронт остаётся на reg.ru Host-A)
# Файл: /etc/nginx/sites-available/marina-crm-api

server {
    listen 80;
    listen [::]:80;
    server_name api.1marina.ru;

    client_max_body_size 50m;

    access_log /var/log/nginx/marina-crm-api-access.log;
    error_log /var/log/nginx/marina-crm-api-error.log;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
